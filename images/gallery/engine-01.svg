<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Apparatus gallery placeholder</title>
  <desc id="desc">Illustrated placeholder for a Wills Point Volunteer Fire Department apparatus photo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#28110f"/>
      <stop offset="100%" stop-color="#7e1c13"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="92" y="120" width="1016" height="660" rx="44" fill="#fffaf3" opacity=".07"/>
  <rect x="160" y="370" width="640" height="170" rx="24" fill="#d2a23d" opacity=".95"/>
  <rect x="720" y="320" width="180" height="220" rx="20" fill="#d2a23d" opacity=".95"/>
  <circle cx="310" cy="590" r="70" fill="#1f252c"/>
  <circle cx="310" cy="590" r="34" fill="#fffaf3"/>
  <circle cx="720" cy="590" r="70" fill="#1f252c"/>
  <circle cx="720" cy="590" r="34" fill="#fffaf3"/>
  <text x="160" y="250" fill="#f2c76c" font-family="Barlow Condensed, Arial, sans-serif" font-size="42" letter-spacing="5">WPVFD GALLERY</text>
  <text x="160" y="720" fill="#fff8ef" font-family="Barlow Condensed, Arial, sans-serif" font-size="110" font-weight="700">APPARATUS</text>
</svg>
