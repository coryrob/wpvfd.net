<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Training gallery placeholder</title>
  <desc id="desc">Illustrated placeholder for a Wills Point Volunteer Fire Department training photo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5d100d"/>
      <stop offset="100%" stop-color="#ad2317"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="950" cy="170" r="140" fill="#d2a23d" opacity=".22"/>
  <rect x="120" y="180" width="960" height="540" rx="36" fill="#fffaf3" opacity=".08" stroke="#fffaf3" stroke-opacity=".15"/>
  <text x="120" y="155" fill="#f2c76c" font-family="Barlow Condensed, Arial, sans-serif" font-size="42" letter-spacing="5">WPVFD GALLERY</text>
  <text x="120" y="360" fill="#fff8ef" font-family="Barlow Condensed, Arial, sans-serif" font-size="118" font-weight="700">TRAINING</text>
  <text x="120" y="440" fill="#fff8ef" font-family="Public Sans, Arial, sans-serif" font-size="34">Replace this placeholder with a real training photo in</text>
  <text x="120" y="488" fill="#fff8ef" font-family="Public Sans, Arial, sans-serif" font-size="34">images/gallery/ and update js/gallery-data.js</text>
</svg>
